<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dapur Khas Melayu Menggkopot</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen flex justify-center items-center p-0 md:p-4">

    <div class="w-full max-w-md bg-white min-h-screen md:min-h-[850px] md:h-[850px] shadow-2xl relative rounded-none md:rounded-3xl overflow-hidden border border-gray-100 flex flex-col">
        
        <header id="main-header" class="bg-gradient-to-r from-amber-500 to-orange-600 text-white p-6 text-center shadow-md shrink-0 hidden">
            <h1 class="text-xl font-bold tracking-tight">Dapur Khas Melayu Menggkopot</h1>
            <p class="text-xs text-amber-100 mt-1"><i class="fas fa-map-marker-alt mr-1"></i> Pekanbaru, Riau</p>
        </header>

        <main class="flex-1 flex flex-col overflow-y-auto">
            
            <div id="page-splash" class="page-content flex-1 bg-gradient-to-b from-amber-500 to-orange-600 flex flex-col justify-between p-8 text-center text-white">
                <div class="my-auto">
                    <div class="w-24 h-24 bg-white text-orange-600 text-5xl font-black flex items-center justify-center rounded-2xl mx-auto shadow-lg mb-4">
                        D
                    </div>
                    <h2 class="text-2xl font-extrabold tracking-tight">Dapur Khas Melayu<br>Menggkopot</h2>
                    <p class="text-amber-100 mt-2 text-sm">Hidangan Otentik Melayu Pekanbaru</p>
                    
                    <button onclick="navigateTo('menu_utama')" class="mt-8 bg-white text-orange-600 font-bold px-8 py-3 rounded-full shadow-md hover:bg-amber-50 transition transform active:scale-95 cursor-pointer">
                        Mulai Masuk
                    </button>
                </div>
            </div>

            <div id="page-menu_utama" class="page-content p-4 hidden">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-base font-black uppercase tracking-wider text-gray-700">KATEGORI: NASI</h3>
                    <span class="text-xs text-gray-400">Klik kategori di beranda untuk filter</span>
                </div>
                
                <div id="daftar-menu-container" class="space-y-3">
                    <p class="text-gray-400 text-sm text-center py-8">Memuat data hidangan...</p>
                </div>
            </div>

            <div id="page-status_pesanan" class="page-content p-4 hidden">
                <h3 class="text-lg font-bold mb-4">Keranjang Belanja</h3>
                <p class="text-gray-400 text-sm text-center py-8">Belum ada pesanan yang dibuat.</p>
            </div>

            <div id="page-profil" class="page-content p-4 hidden">
                <h3 class="text-lg font-bold mb-4">Akun Saya</h3>
                <p class="text-gray-400 text-sm text-center py-8">Informasi Profil Dapur Melayu.</p>
            </div>

        </main>

        <footer class="bg-white border-t border-gray-150 p-2 flex justify-around shrink-0">
            <button onclick="navigateTo('menu_utama')" id="nav-menu_utama" class="text-orange-500 flex flex-col items-center gap-1 transition cursor-pointer">
                <i class="fas fa-utensils text-base"></i><span class="text-xs">Menu</span>
            </button>
            <button onclick="navigateTo('status_pesanan')" id="nav-status_pesanan" class="text-gray-400 hover:text-gray-600 flex flex-col items-center gap-1 transition cursor-pointer">
                <i class="fas fa-clipboard-list text-base"></i><span class="text-xs">Pesanan</span>
            </button>
            <button onclick="navigateTo('profil')" id="nav-profil" class="text-gray-400 hover:text-gray-600 flex flex-col items-center gap-1 transition cursor-pointer">
                <i class="fas fa-user text-base"></i><span class="text-xs">Profil</span>
            </button>
        </footer>

    </div>

    <script>
        // Inisialisasi Supabase menggunakan variabel aman global window
        window.supabaseUrl = "https://ufpvxfnbrgcvtzccaszk.supabase.co";
        window.supabaseKey = "sb_publishable_YtNabEGPnwtek6pL8N8Ghg_CYk0-aJF";

        if (typeof Supabase !== 'undefined') {
            window.supabase = Supabase.createClient(window.supabaseUrl, window.supabaseKey);
            console.log("Supabase terhubung dengan sukses!");
        } else {
            console.error("Library Supabase tidak ditemukan. Pastikan CDN sudah terpasang di <head>");
        }

        // Fungsi Perpindahan Halaman
        function navigateTo(pageId) {
            const pages = document.querySelectorAll('.page-content');
            pages.forEach(page => page.classList.add('hidden'));

            const activePage = document.getElementById(`page-${pageId}`);
            if (activePage) {
                activePage.classList.remove('hidden');
            }

            const header = document.getElementById('main-header');
            if (pageId === 'splash') {
                header.classList.add('hidden');
            } else {
                header.classList.remove('hidden');
            }

            updateNavStyles(pageId);

            if (pageId === 'menu_utama') {
                ambilDataMenu();
            }
        }

        function updateNavStyles(activePageId) {
            const navIds = ['menu_utama', 'status_pesanan', 'profil'];
            navIds.forEach(id => {
                const navBtn = document.getElementById(`nav-${id}`);
                if (navBtn) {
                    if (id === activePageId) {
                        navBtn.className = "text-orange-500 flex flex-col items-center gap-1 transition cursor-pointer";
                    } else {
                        navBtn.className = "text-gray-400 hover:text-gray-600 flex flex-col items-center gap-1 transition cursor-pointer";
                    }
                }
            });
        }

        // Fungsi Menarik Data dari Supabase
        async function ambilDataMenu() {
            const container = document.getElementById('daftar-menu-container');
            
            // Cek ulang apakah client supabase siap digunakan
            if (!window.supabase) {
                container.innerHTML = `<p class="text-red-500 text-xs text-center">Inisialisasi database gagal. Library tidak termuat.</p>`;
                return;
            }

            try {
                // Menarik data dari tabel 'menu'
                const { data, error } = await window.supabase
                    .from('menu')
                    .select('*');

                if (error) throw error;

                if (!data || data.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-8">
                            <i class="fas fa-folder-open text-gray-300 text-3xl mb-2"></i>
                            <p class="text-gray-500 text-sm">Tabel 'menu' di Supabase Anda masih kosong.</p>
                            <p class="text-xs text-gray-400 mt-1">Silakan tambahkan data baris makanan di dashboard Supabase.</p>
                        </div>`;
                    return;
                }

                container.innerHTML = ''; // Bersihkan teks loading
                
                // Merender data dari database
                data.forEach(item => {
                    const namaMenu = item.nama || item.nama_menu || "Menu Tanpa Nama";
                    const hargaMenu = item.harga || item.harga_menu || 0;
                    const deskripsiMenu = item.deskripsi || item.detail || "Tidak ada deskripsi.";
                    const emojiMenu = item.emoji || "🍲";

                    const card = document.createElement('div');
                    card.className = "bg-white p-4 rounded-2xl border border-gray-100 shadow-sm flex justify-between items-center hover:border-amber-200 transition";
                    card.innerHTML = `
                        <div class="flex items-center gap-3">
                            <div class="text-2xl bg-amber-50 w-12 h-12 flex items-center justify-center rounded-xl">${emojiMenu}</div>
                            <div>
                                <h4 class="font-bold text-gray-800 text-sm">${namaMenu}</h4>
                                <p class="text-xs text-gray-400 line-clamp-1 w-48">${deskripsiMenu}</p>
                                <p class="text-xs font-extrabold text-orange-600 mt-1">Rp ${Number(hargaMenu).toLocaleString('id-ID')}</p>
                            </div>
                        </div>
                        <button class="bg-orange-500 hover:bg-orange-600 text-white text-xs px-4 py-2 rounded-full font-bold shadow-sm active:scale-95 transition cursor-pointer">
                            + Tambah
                        </button>
                    `;
                    container.appendChild(card);
                });

            } catch (err) {
                console.error("Gagal memuat:", err.message);
                container.innerHTML = `
                    <div class="text-center py-6">
                        <i class="fas fa-exclamation-triangle text-red-400 text-2xl mb-2"></i>
                        <p class="text-red-500 text-sm font-semibold">Gagal memuat data menu.</p>
                        <p class="text-gray-400 text-xs mt-2 px-4 bg-gray-50 py-2 rounded-lg border border-dashed">
                            Pastikan Anda sudah menonaktifkan aturan keamanan database (klik <strong>Disable RLS</strong>) pada tabel 'menu' di dasbor Supabase Anda.
                        </p>
                    </div>`;
            }
        }
    </script>
</body>
</html>
